<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão de Colaboradores</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🏢 Sistema de Gestão de Colaboradores</h1>
</header>

<div class="container">

    <div class="card">
        <h2>Cadastro de Colaborador</h2>

        <form id="formulario">

            <input type="text" id="nome" placeholder="Nome Completo" required>

            <input type="number" id="idade" placeholder="Idade" required>

            <input type="text" id="cargo" placeholder="Cargo" required>

            <input type="number" id="salario" placeholder="Salário" required>

            <input type="text" id="tempo" placeholder="Tempo de Empresa" required>

            <input type="date" id="admissao" required>

            <input type="text" id="setor" placeholder="Setor" required>

            <select id="status">
                <option value="Ativo">Ativo</option>
                <option value="Inativo">Inativo</option>
            </select>

            <button type="submit">
                Cadastrar Colaborador
            </button>

        </form>
    </div>

    <div class="card">
        <h2>Lista de Colaboradores</h2>

        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Cargo</th>
                    <th>Setor</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="lista">

            </tbody>
        </table>

    </div>

</div>

<footer>
    Sistema de Gestão de Colaboradores © 2026 <br>
    Desenvolvido por Trícia Britto
</footer>

<script src="script.js"></script>

</body>
</html>
